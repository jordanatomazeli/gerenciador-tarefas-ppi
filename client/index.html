<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>PPI</title>

<body>

<h1>Gerenciador de Tarefas</h1>



<form id="formCadastro">

<div id="listaContainer"></div>

<script src="app.js"></script>

</body>
